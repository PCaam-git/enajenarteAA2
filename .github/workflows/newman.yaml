name: Newman integration tests
# se ejecuta al hacer pull request en develop o main
on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  newman-tests:
    runs-on: ubuntu-latest

# los secretos están guardados en github
    env:
      MARIADB_USER: ${{ secrets.MARIADB_USER }}
      MARIADB_PASSWORD: ${{ secrets.MARIADB_PASSWORD }}
      MARIADB_DATABASE: ${{ secrets.MARIADB_DATABASE }}
      MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

# instala pnpm
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

# Instala newman
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

# Genera el .jar
      - name: Build Spring Boot jar
        run: mvn clean package -DskipTests

# Levanta MariaDb + la api
      - name: Start Docker Compose
        run: docker compose up -d --build

# Espera a que SpringBoot responda
      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8085/api/v2/workshops > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API did not start in time"
          docker compose logs
          exit 1

# Ejecuta los test Postman
      - name: Run Newman collection
        run: pnpm exec newman run postman/enajenarte_aa2_workshops_newman.postman_collection.json -e postman/enajenarte_aa2_local_docker.postman_environment.json

# Apaga los contenedores
      - name: Stop Docker Compose
        if: always()
        run: docker compose down