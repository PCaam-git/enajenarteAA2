                    id: 2
                    title: Arte terapia
                    location: Madrid
                    eventDate: 2026-03-01T18:00:00
                    entryFee: 10
                    public: true
                    speakerId: 1
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Speaker not found
          content:
            application/json:
