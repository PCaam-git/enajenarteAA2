  #
  # REGISTRATIONS ENDPOINTS
  #
  /registrations:
    get:
      summary: Devuelve la lista de inscripciones
      description: |
        Devuelve una lista con todas las inscripciones registradas.

        Se permite filtrar inscripciones por tres campos al mismo tiempo:
          - **userId**: filtra por identificador de usuario.
          - **workshopId**: filtra por identificador de taller.
          - **isPaid**: filtra por estado de pago.
      parameters:
        - name: userId
          in: query
          description: Filtra por identificador de usuario
          required: false
          schema:
            type: string
        - name: workshopId
          in: query
          description: Filtra por identificador de taller
          required: false
          schema:
            type: string
        - name: isPaid
          in: query
          description: Filtra por estado de pago
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK. Lista de inscripciones obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistrationOutDto'
              examples:
                example1:
                  value:
                    - id: 1
                      registrationDate: 2026-01-10
                      confirmationCode: CONF-1
                      paid: false
                      numberOfTickets: 2
                      amountPaid: 0
                      rating: null
                      userId: 1
                      workshopId: 10
                example2:
                  value:
                    - id: 2
                      registrationDate: 2026-01-11
                      confirmationCode: CONF-2
                      paid: true
                      numberOfTickets: 1
                      amountPaid: 20
                      rating: 5
                      userId: 2
                      workshopId: 10
        '204':
          description: No existen inscripciones que cumplan los filtros indicados
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      summary: Registrar una inscripción
      description: Registra una nueva inscripción de un usuario en un taller
      requestBody:
        description: Datos de la nueva inscripción
        content:
          application/json:
            schema:
