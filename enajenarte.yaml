  #
  # EVENTS ENDPOINTS
  #
  /events:
    get:
      summary: Devuelve la lista de eventos
      description: |
        Devuelve una lista con todos los eventos disponibles.

        Se permite filtrar eventos por tres campos al mismo tiempo:
          - **title**: filtra por título.
          - **location**: filtra por ubicación.
          - **isPublic**: filtra por visibilidad pública.
      parameters:
        - name: title
          in: query
          description: Filtra por título del evento
          required: false
          schema:
            type: string
        - name: location
          in: query
          description: Filtra por ubicación del evento
          required: false
          schema:
            type: string
        - name: isPublic
          in: query
          description: Filtra por eventos públicos o privados
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK. Lista de eventos obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventOutDto'
              examples:
                example1:
                  value:
                    - id: 1
                      title: Mindfulness
                      location: Zaragoza
                      eventDate: 2026-02-01T10:00:00
                      entryFee: 0
                      public: true
                      speakerId: 1
                example2:
                  value:
                    - id: 2
                      title: Arte terapia
                      location: Madrid
                      eventDate: 2026-03-01T18:00:00
                      entryFee: 10
                      public: true
                      speakerId: 1
                    - id: 3
                      title: Yoga
                      location: Zaragoza
                      eventDate: 2026-02-20T18:00:00
                      entryFee: 5
                      public: true
                      speakerId: 2
        '204':
          description: No existen eventos que cumplan los filtros indicados
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      summary: Registrar un evento
      description: Registra un nuevo evento asociado a un ponente
      requestBody:
        description: Datos del nuevo evento
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInDto'
            examples:
              example1:
                value:
                  title: Mindfulness
                  location: Zaragoza
                  eventDate: 2026-02-01T10:00:00
                  entryFee: 0
                  public: true
                  expectedAttendance: 30
                  speakerId: 1
              example2:
                value:
                  title: Arte terapia
                  location: Madrid
                  eventDate: 2026-03-01T18:00:00
                  entryFee: 10
                  public: true
                  expectedAttendance: 50
                  speakerId: 1
      responses:
        '201':
          description: Evento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventOutDto'
              examples:
                example1:
                  value:
                    id: 1
                    title: Mindfulness
                    location: Zaragoza
                    eventDate: 2026-02-01T10:00:00
                    entryFee: 0
                    public: true
                    speakerId: 1
                example2:
