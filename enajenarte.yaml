  #
  # WORKSHOPS V2 ENDPOINTS
  #
  /api/v2/workshops:
    get:
      summary: Devuelve la lista de talleres en la versión 2
      description: |
        Versión 2 de la operación GET de talleres.

        Esta versión modifica la salida respecto a la versión 1:
          - Incluye **maxCapacity** como dato útil para el cliente.
          - Sustituye **speakerId** por **speakerName** para mostrar el nombre del ponente.

        Ejemplo de diferencia:
          - La versión 1 devuelve speakerId.
          - La versión 2 devuelve speakerName.
      parameters:
        - name: name
          in: query
          description: Filtra por nombre del taller
          required: false
          schema:
            type: string
        - name: isOnline
          in: query
          description: Filtra por talleres online o presenciales
          required: false
          schema:
            type: string
        - name: speakerId
          in: query
          description: Filtra por identificador de ponente
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK. Lista de talleres obtenida exitosamente en versión 2
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkshopOutDtoV2'
              examples:
                example1:
                  value:
                    - id: 1
                      name: Taller de creatividad emocional
                      description: Taller práctico para trabajar la expresión emocional.
                      startDate: 2026-06-15
                      durationMinutes: 90
                      price: 25
                      online: false
                      maxCapacity: 12
                      speakerName: Ana Lopez
                example2:
                  value:
                    - id: 2
                      name: Taller online de comunicación
                      description: Taller online para trabajar comunicación emocional.
                      startDate: 2026-07-15
                      durationMinutes: 120
                      price: 30
                      online: true
                      maxCapacity: 20
                      speakerName: Lucia Martin
        '204':
          description: No existen talleres que cumplan los filtros indicados
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      summary: Registrar un taller en la versión 2
      description: |
        Registra un nuevo taller en la versión 2.

        Esta versión añade control de duplicados. Si ya existe un taller con los mismos datos principales,
        la API devuelve 409 Conflict.
      requestBody:
        description: Datos del nuevo taller
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkshopInDto'
            examples:
              example1:
                value:
                  name: Taller de creatividad emocional
                  description: Taller práctico para trabajar la expresión emocional.
                  startDate: 2026-06-15
                  durationMinutes: 90
                  price: 25
                  maxCapacity: 12
                  online: false
                  speakerId: 1
              example2:
                value:
                  name: Taller online de comunicación
                  description: Taller online para trabajar comunicación emocional.
                  startDate: 2026-07-15
                  durationMinutes: 120
                  price: 30
                  maxCapacity: 20
                  online: true
                  speakerId: 1
      responses:
        '201':
          description: Taller registrado en versión 2
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkshopOutDto'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Speaker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '409':
          description: Conflict. Ya existe un taller con los mismos datos principales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictWorkshopDuplicado'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /api/v2/workshops/{id}:
    put:
      summary: Modificar taller en la versión 2
      description: |
        Actualiza un taller existente en la versión 2.

        Esta versión añade control de duplicados también durante la edición. Si al modificar un taller sus datos coinciden con los de otro taller existente,
        la API devuelve 409 Conflict.
      parameters:
        - name: id
          in: path
          description: Identificador del taller
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Datos actualizados del taller
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkshopInDto'
            examples:
              example1:
                value:
                  name: Taller de creatividad emocional actualizado
                  description: Taller actualizado.
                  startDate: 2026-06-20
                  durationMinutes: 120
                  price: 30
                  maxCapacity: 15
                  online: false
                  speakerId: 1
              example2:
                value:
                  name: Taller de creatividad emocional
                  description: Taller práctico para trabajar la expresión emocional.
                  startDate: 2026-06-15
                  durationMinutes: 90
                  price: 25
                  maxCapacity: 12
                  online: false
                  speakerId: 1
      responses:
        '200':
          description: Taller modificado exitosamente en versión 2
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkshopOutDto'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Workshop or speaker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '409':
          description: Conflict. La modificación genera un taller duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictWorkshopDuplicado'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    delete:
      summary: Eliminar taller en la versión 2
      description: |
        Elimina un taller existente en la versión 2.

        Esta versión añade control de integridad funcional. Si el taller tiene inscripciones asociadas,
        no se elimina y la API devuelve 409 Conflict.
      parameters:
        - name: id
          in: path
          description: Identificador del taller
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Taller eliminado correctamente en versión 2
        '404':
          description: Workshop not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '409':
          description: Conflict. El taller tiene inscripciones asociadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictWorkshopInscripciones'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
components:
  schemas:
    UserInDto:
      type: object
      properties:
        username:
          type: string
          description: Nombre de usuario
        password:
          type: string
          description: Contraseña del usuario
        email:
          type: string
          description: Correo electrónico del usuario
        fullName:
          type: string
          description: Nombre completo del usuario
        age:
          type: integer
          format: int32
          description: Edad del usuario
      example:
        username: Patricia
        password: patricia123
        email: patricia@mail.com
        fullName: Patricia User
        age: 25
    UserOutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identificador único del usuario
        username:
          type: string
          description: Nombre de usuario
        email:
          type: string
          description: Correo electrónico del usuario
        fullName:
          type: string
          description: Nombre completo del usuario
        role:
          type: string
          description: Rol del usuario
      example:
        id: 1
        username: patricia
        email: patricia@mail.com
        fullName: Patricia User
        role: user
    SpeakerInDto:
      type: object
      properties:
        firstName:
          type: string
          description: Nombre del ponente
        lastName:
          type: string
          description: Apellidos del ponente
        email:
          type: string
          description: Correo electrónico del ponente
