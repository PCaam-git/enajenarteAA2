            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SpeakerOutDto'
              examples:
                example1:
                  value:
                    - id: 1
                      firstName: Ana
                      lastName: Lopez
                      email: ana@mail.com
                      speciality: mindfulness
                      yearsExperience: 5
                example2:
                  value:
                    - id: 2
                      firstName: Lucia
                      lastName: Martin
                      email: lucia@mail.com
                      speciality: oratoria
                      yearsExperience: 3
                    - id: 3
