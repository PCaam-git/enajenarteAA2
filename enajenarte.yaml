openapi: 3.0.1
info:
  title: Enajenarte AA2 API
  description: |
    API REST del proyecto Enajenarte adaptada para la actividad AA2 de Acceso a Datos.

    El proyecto mantiene los endpoints originales de la API base y añade versionado explícito sobre la entidad Workshop.
    Para Workshop se conserva el endpoint base /workshops, se añade /api/v1/workshops como versión explícita equivalente a la respuesta original y se incorpora /api/v2/workshops con cambios en la salida y en el funcionamiento.

    La versión 1 devuelve la estructura original con speakerId.
    La versión 2 devuelve una salida enriquecida con maxCapacity y speakerName, y añade control de conflictos en POST, PUT y DELETE.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Entorno local de desarrollo
  - url: http://localhost:8085
    description: Entorno Docker Compose local
  - url: http://{ip-publica-ec2}:8085
    description: Entorno desplegado en AWS EC2
    variables:
      ip-publica-ec2:
        default: 0.0.0.0
        description: IP pública de la instancia EC2
  - url: http://gateway.local.gd:8080/Enajenarte/enajenarteApi/2.0
    description: Gateway local de APIMan
paths:
  #
  # USERS ENDPOINTS
  #
  /users:
    get:
      summary: Devuelve la lista de usuarios
      description: |
        Devuelve una lista con los usuarios registrados.

        Se permite filtrar usuarios por tres campos al mismo tiempo:
          - **username**: filtra por nombre de usuario.
          - **email**: filtra por correo electrónico.
          - **active**: filtra por estado activo.
      parameters:
        - name: username
          in: query
          description: Filtra por nombre de usuario
          required: false
          schema:
            type: string
        - name: email
          in: query
          description: Filtra por email
          required: false
          schema:
            type: string
        - name: active
          in: query
          description: Filtra por estado activo
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK. Lista de usuarios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserOutDto'
              examples:
                example1:
                  value:
                    - id: 1
                      username: patricia
                      email: patricia@mail.com
                      fullName: Patricia User
                      role: user
                example2:
                  value:
                    - id: 2
                      username: admin
                      email: admin@mail.com
                      fullName: Admin User
                      role: admin
                    - id: 3
                      username: roberto
                      email: roberto@mail.com
                      fullName: Roberto Uno
                      role: user
        '204':
          description: No existen usuarios que cumplan los filtros indicados
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      summary: Crear un nuevo usuario
      description: Registra un nuevo usuario en el sistema
      requestBody:
        description: Datos del nuevo usuario
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInDto'
            examples:
              example1:
                value:
                  username: Patricia
                  password: patricia123
                  email: patricia@mail.com
                  fullName: Patricia User
                  age: 25
              example2:
                value:
                  username: Roberto
                  password: roberto123
                  email: roberto@mail.com
                  fullName: Roberto Uno
                  age: 45
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOutDto'
              examples:
                example1:
                  value:
                    id: 10
                    username: patricia
                    email: patricia@mail.com
                    fullName: Patricia User
                    role: user
                example2:
                  value:
                    id: 11
                    username: Roberto
                    email: roberto@mail.com
                    fullName: Roberto Uno
                    role: user
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /users/{id}:
    get:
      summary: Obtener usuario por ID
      description: Devuelve un usuario específico por su ID
      parameters:
        - name: id
          in: path
          description: Identificador del usuario
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOutDto'
              examples:
                example1:
                  value:
                    id: 1
                    username: patricia
                    email: patricia@mail.com
                    fullName: Patricia User
                    role: user
                example2:
                  value:
                    id: 2
                    username: admin
                    email: admin@mail.com
                    fullName: Admin User
                    role: admin
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
              example:
                code: 404
                title: not-found
                message: The user does not exist
                errors: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    put:
      summary: Modificar usuario
      description: Actualiza un usuario existente
      parameters:
        - name: id
          in: path
          description: Identificador del usuario
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Datos actualizados del usuario
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInDto'
            examples:
              example1:
                value:
                  username: patricia.updated
                  password: patricia123
                  email: patricia.updated@mail.com
                  fullName: Patricia Updated
                  age: 26
              example2:
                value:
                  username: roberto.updated
                  password: roberto123
                  email: roberto.updated@mail.com
                  fullName: Roberto Updated
                  age: 46
      responses:
        '200':
          description: Usuario modificado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOutDto'
              examples:
                example1:
                  value:
                    id: 1
                    username: patricia.updated
                    email: patricia.updated@mail.com
                    fullName: Patricia Updated
                    role: user
                example2:
                  value:
                    id: 2
                    username: roberto.updated
                    email: roberto.updated@mail.com
                    fullName: Roberto Updated
                    role: user
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    delete:
      summary: Eliminar usuario
      description: Elimina un usuario existente
      parameters:
        - name: id
          in: path
          description: Identificador del usuario
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Usuario eliminado correctamente
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

